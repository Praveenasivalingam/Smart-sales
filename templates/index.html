<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Forecaster</title>
    <!-- Bootstrap 5 CSS Framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 40px; background-color: #f8f9fa; }
        .card { padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .chart-container img { max-width: 100%; height: auto; margin-top: 15px; border: 1px solid #ddd; border-radius: 4px; }
        /* Makes the auto-generated pandas table look clean */
        .table-responsive table { width: 100%; class: table table-striped table-hover; }

        /* ============================================================
           ADDED: Mobile phone-frame view
           This only adds a visual "device frame" wrapper for previewing
           the page as it would look on a phone. Nothing above/below
           this block was modified.
           ============================================================ */
        .phone-frame-outer {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 30px 10px;
            background: #e9ecef;
        }
        .phone-frame {
            width: 390px;              /* iPhone-ish width */
            max-width: 100%;
            border: 12px solid #1c1c1e;
            border-radius: 40px;
            background: #f8f9fa;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            overflow: hidden;
            position: relative;
        }
        .phone-frame::before {
            /* notch */
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 22px;
            background: #1c1c1e;
            border-bottom-left-radius: 14px;
            border-bottom-right-radius: 14px;
            z-index: 10;
        }
        .phone-frame-screen {
            max-height: 844px;
            overflow-y: auto;
            padding-top: 22px; /* space for notch */
        }
        /* Inside the phone frame, override the original body padding
           so content fits a narrow screen without editing body{} above */
        .phone-frame-screen .container {
            padding: 0 12px;
        }
        .phone-frame-screen h1 {
            font-size: 1.4rem;
        }
        .phone-frame-screen .card {
            padding: 14px;
            margin-bottom: 14px;
        }
        .phone-frame-screen .row.g-3 > [class^="col-md-"] {
            /* stack form fields on narrow screens */
            width: 100%;
            max-width: 100%;
            flex: 0 0 100%;
        }
        .phone-frame-screen .table-responsive {
            font-size: 0.8rem;
        }

        /* Optional: if you just want normal in-browser responsiveness
           (no visible frame chrome), this media query alone handles it
           when .phone-frame-outer isn't used. */
        @media (max-width: 480px) {
            body { padding: 15px; }
            .card { padding: 14px; }
            h1.mb-4 { font-size: 1.4rem; }
        }
        /* ============================================================
           END ADDED SECTION
           ============================================================ */
    </style>
</head>
<body>
    <!-- ADDED: wrapper div creating the mobile device frame -->
    <div class="phone-frame-outer">
    <div class="phone-frame">
    <div class="phone-frame-screen">

    <div class="container">
        <h1 class="mb-4">Prophet Sales Forecaster</h1>
        
        <!-- Error Alerts -->
        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endif %}
        <!-- Input Parameters Form -->
        <div class="card">
            <form method="POST" enctype="multipart/form-data">
                <div class="row g-3">
                    <div class="col-md-12">
                        <label class="form-label font-weight-bold">Upload Dataset (CSV or Excel)</label>
                        <input type="file" class="form-control" name="file" accept=".csv, .xlsx, .xls" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Date Column Name</label>
                        <input type="text" class="form-control" name="date_col" value="Date" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Sales Column Name</label>
                        <input type="text" class="form-control" name="sales_col" value="Sales" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Forecast Horizon (Days)</label>
                        <input type="number" class="form-control" name="forecast_days" value="90" min="1" required>
                    </div>
                    <div class="col-md-12">
                        <button type="submit" class="btn btn-primary w-100 mt-3">Generate Forecast</button>
                    </div>
                </div>
            </form>
        </div>
        <!-- Render Forecast Outputs Conditionality -->
        {% if summary_table %}
        <div class="card">
            <h3 class="mb-3">Forecast Summary (End of Horizon)</h3>
            <div class="table-responsive">
                {{ summary_table | safe }}
            </div>
        </div>
        <div class="card chart-container">
            <h3>Forecast Trend</h3>
            <img src="data:image/png;base64,{{ plot1 }}" alt="Forecast Plot">
        </div>
        <div class="card chart-container">
            <h3>Time Series Components</h3>
            <img src="data:image/png;base64,{{ plot2 }}" alt="Components Plot">
        </div>
        {% endif %}
    </div>

    </div>
    </div>
    </div>
    <!-- END ADDED wrapper div -->
    
    <!-- Bootstrap JS Bundle for dismissible alerts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
